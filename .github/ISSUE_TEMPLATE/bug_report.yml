name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Kappastream is an
        anonymous, read-only Twitch viewer — there is no login or account.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I open channel X, ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we see the problem ourselves?
      placeholder: |
        1. Open '...'
        2. Type '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: How are you running Kappastream?
      options:
        - AppImage
        - .deb package
        - .rpm package
        - Browser (npm run dev)
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: The version shown in the About modal, or `git describe` / the release tag.
      placeholder: "0.1.0"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 22.04, Fedora 39, ..."

  - type: textarea
    id: logs
    attributes:
      label: Logs / error text
      description: |
        Paste any relevant console output or error messages. Redact any
        personal information first.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help? Screenshots, related channels, etc.
