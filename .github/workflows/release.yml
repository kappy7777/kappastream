# Release builds: build the Tauri bundles and publish the GitHub Release with a
# SHA256SUMS checksum file.
#
# Triggered by pushing a tag matching `v*` (e.g. `v0.1.8`), or manually via
# `workflow_dispatch`. The pipeline first runs the full CI gate set (check),
# then builds the bundles across TWO runners and finally publishes from a single
# job — so a broken commit can never ship as a tag, and a failed bundle build
# can never produce a partially-published release.
#
# ┌───────────────────────────────────────────────────────────────────────┐
# │ WHY TWO DIFFERENT UBUNTU VERSIONS (intentional, do not "normalize")   │
# │                                                                       │
# │  • Native packages (.deb / .rpm / AUR -bin tarball) are built on      │
# │    ubuntu-22.04 to keep their glibc (2.35) compatibility window as    │
# │    wide as possible. These packages do NOT bundle WebKitGTK/GStreamer │
# │    — they link the host's system libraries at runtime — so the build  │
# │    baseline only affects the compiled binary's glibc requirement.     │
# │                                                                       │
# │  • The AppImage is built on ubuntu-24.04 to bundle the newer          │
# │    WebKitGTK 2.44 + GStreamer stack, which is dramatically smoother   │
# │    on modern NVIDIA/Wayland systems than the 22.04-bundled stack.     │
# │    bundleMediaFramework:true still copies the 24.04 GStreamer codec   │
# │    .so files (incl. libgstlibav → avdec_h264 for H.264) into the      │
# │    AppImage. This RAISES the AppImage's glibc requirement vs 22.04;   │
# │    the build-appimage job measures and reports the actual highest     │
# │    GLIBC_* requirement, and it is recorded in the release notes.      │
# │                                                                       │
# │  Native packages and the AppImage therefore intentionally diverge in  │
# │  build baseline. Only the AppImage is allowed to use the newer stack. │
# └───────────────────────────────────────────────────────────────────────┘
name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger: build all bundles and retain them as workflow artifacts.
  # Set `publish` to true to also create/publish a real GitHub release for
  # `tag`. Without `publish`, this is a pure smoke test that touches no
  # release — useful for validating bundle changes before tagging.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to build (e.g. v0.1.8). Must not already exist as a published release."
        required: true
        type: string
      publish:
        description: "Publish a real GitHub release (otherwise just build + keep workflow artifacts)."
        required: false
        type: boolean
        default: false

# Build jobs only need read access. Only the publish job elevates to write.
permissions:
  contents: read

# The release tag is the pushed tag (github.ref_name) on a tag push, or the
# explicit `tag` input on a manual run. `inputs.tag` is empty on push events,
# so this falls back to the tag in that case.
env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

# A tag points at exactly one commit; don't let two runs for the same tag race
# (e.g. a re-pushed tag). Never cancel an in-flight release mid-upload.
concurrency:
  # NOTE: the `env` context is NOT available in `concurrency` (it's resolved
  # before jobs/env are computed), so reference inputs/github directly here.
  # The job steps below still use the top-level `env.RELEASE_TAG`.
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Reuse the exact CI gates (npm run check + npm test + cargo fmt + clippy
  # -D warnings + cargo test + version-drift check) so a tagged commit can't
  # ship unless it passes the same checks as main.
  check:
    name: check
    uses: ./.github/workflows/ci.yml

  # ── Native packages: .deb + .rpm + the AUR -bin tarball ───────────────
  # ubuntu-22.04 (glibc 2.35) keeps the widest native-package compatibility.
  # The AUR tarball reuses THIS job's compiled binary, so it inherits the same
  # 22.04 baseline. No AppImage is built here.
  build-native-packages:
    name: build native (deb/rpm/aur) · ubuntu-22.04
    needs: [check]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Install Tauri system dependencies
        # Tauri v2 (linux) build requirements. The GStreamer codec packages
        # are deliberately NOT installed here: .deb/.rpm do not bundle media
        # (they rely on the host's system libs at runtime), and
        # bundleMediaFramework only runs for the AppImage target. Only the
        # webkit2gtk-4.1 / soup-3 / gtk-3 / appindicator dev headers needed
        # to compile/link are required here.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            libayatana-appindicator3-dev

      # Separate cache key from the AppImage job: 22.04 and 24.04 produce
      # glibc-incompatible target/ dirs that must never cross-restore.
      - name: Cache Cargo (~/.cargo + src-tauri/target)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: native-2204

      - name: Install JS dependencies
        run: npm ci

      - name: Verify release tag matches package version
        # Enforced only on real tag pushes (a smoke-test dispatch may build a
        # not-yet-bumped tree). scripts/check-versions.sh (run by the check
        # job) already guarantees package.json == Cargo.toml == Cargo.lock.
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -eu
          pkgver="$(node -p "require('./package.json').version")"
          tagver="${RELEASE_TAG#v}"
          if [ "$pkgver" != "$tagver" ]; then
            echo "ERROR: tag '${RELEASE_TAG}' (v-stripped '${tagver}') != package.json version '${pkgver}'" >&2
            exit 1
          fi
          echo "OK: tag ${RELEASE_TAG} matches package.json ${pkgver}"

      # `tauri build` always compiles src-tauri/target/release/kappastream
      # first, then produces only the selected bundle formats. The compiled
      # native binary is reused by the AUR tarball step below.
      - name: Build .deb and .rpm
        run: npm run tauri -- build --bundles deb,rpm

      # Packages the just-compiled 22.04 native binary with desktop/metainfo/
      # wrapper/icons/LICENSE into packaging/aur/dist/kappastream-<ver>-x86_64.tar.gz
      # (consumed by the kappastream-bin AUR PKGBUILD).
      - name: Build AUR -bin tarball
        run: packaging/aur/build-release-tarball.sh

      - name: Stage artifacts
        run: |
          set -eu
          mkdir -p staging
          cp src-tauri/target/release/bundle/deb/*.deb staging/
          cp src-tauri/target/release/bundle/rpm/*.rpm staging/
          cp packaging/aur/dist/*.tar.gz staging/
          echo "Staged native artifacts:"
          find staging -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Upload native artifacts
        uses: actions/upload-artifact@v7
        with:
          name: native-packages
          path: staging/
          if-no-files-found: error
          retention-days: 7

  # ── AppImage: built separately on ubuntu-24.04 ────────────────────────
  # The newer WebKitGTK 2.44 + GStreamer stack bundles a much smoother media
  # pipeline than 22.04's. bundleMediaFramework:true copies the 24.04 codec
  # .so files (incl. libgstlibav → avdec_h264) into the AppImage.
  build-appimage:
    name: build AppImage · ubuntu-24.04
    needs: [check]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Install Tauri + GStreamer system dependencies
        # Same dev headers as the native job, PLUS the GStreamer runtime codec
        # set. tauri.conf.json sets bundle.appimage.bundleMediaFramework = true,
        # which makes linuxdeploy's gstreamer plugin copy the build host's codec
        # .so files (from /usr/lib/x86_64-linux-gnu/gstreamer-1.0/) INTO the
        # AppImage so media playback is self-contained:
        #   - gstreamer1.0-libav provides libgstlibav → avdec_h264 (Twitch is
        #     H.264). Without it the build SUCCEEDS but ships audio + black
        #     video.
        # Package names are identical on 22.04 and 24.04; they resolve against
        # 24.04's newer versions here (webkit2gtk-4.1 2.44, gstreamer 1.24).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            libayatana-appindicator3-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - name: Cache Cargo (~/.cargo + src-tauri/target)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: appimage-2404

      - name: Install JS dependencies
        run: npm ci

      - name: Verify release tag matches package version
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          set -eu
          pkgver="$(node -p "require('./package.json').version")"
          tagver="${RELEASE_TAG#v}"
          if [ "$pkgver" != "$tagver" ]; then
            echo "ERROR: tag '${RELEASE_TAG}' (v-stripped '${tagver}') != package.json version '${pkgver}'" >&2
            exit 1
          fi
          echo "OK: tag ${RELEASE_TAG} matches package.json ${pkgver}"

      - name: Build AppImage
        run: npm run tauri -- build --bundles appimage

      # Measure the actual highest GLIBC_* requirement across every ELF file
      # bundled into the AppImage, so the compatibility window is documented
      # honestly (not guessed from the runner name). Surfaced on the run page
      # via the job summary and carried into the release notes.
      - name: Measure AppImage glibc requirement
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          bundle_dir="src-tauri/target/release/bundle/appimage"
          # The Tauri appimage bundler leaves kappastream.AppDir/ (the staged
          # AppDir) next to the final AppImage. It contains the IDENTICAL ELF
          # payload (binary + bundled .so + GStreamer plugins) that ships inside
          # the AppImage, so measuring it is equivalent — and it needs no
          # extraction, which is reliable on runners where the AppImage runtime
          # / FUSE can't run. Fall back to extracting the AppImage if the AppDir
          # is absent (the script handles both files and directories).
          target="$(find "$bundle_dir" -maxdepth 1 -name '*.AppDir' -type d | head -n1)"
          if [ -z "$target" ]; then
            target="$(find "$bundle_dir" -name '*.AppImage' -type f | head -n1)"
          fi
          test -n "$target"
          echo "Measuring: $target"
          scripts/measure-appimage-glibc.sh "$target" | tee glibc-report.txt
          {
            echo "## AppImage glibc requirement"
            echo '```'
            cat glibc-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Single highest-requirement token (e.g. GLIBC_2.34) for the notes.
          grep -oE 'GLIBC_[0-9]+\.[0-9]+' glibc-report.txt | sort -V | tail -n1 \
            > staging/appimage-glibc-requirement.txt

      - name: Stage AppImage
        run: |
          set -eu
          cp src-tauri/target/release/bundle/appimage/*.AppImage staging/
          echo "Staged AppImage artifacts:"
          find staging -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: appimage
          path: staging/
          if-no-files-found: error
          retention-days: 7

  # ── Single publication job ────────────────────────────────────────────
  # The ONLY job that creates/edits the GitHub release. Build jobs have read
  # permissions only and never touch the release, so two builds can never race
  # on release creation. The release stays DRAFT until every artifact AND
  # SHA256SUMS are attached; only then is it flipped to public.
  publish-release:
    name: publish release
    needs: [check, build-native-packages, build-appimage]
    # Publish on a real tag push, or an explicit manual opt-in. A manual
    # dispatch without `publish` builds everything and keeps the workflow
    # artifacts without creating any release.
    if: ${{ github.event_name == 'push' || inputs.publish == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # `gh` resolves the target repository from the local git remote, and
      # `--target` resolves the commit sha via git — so publish needs a real
      # checkout (the build artifacts arrive via download-artifact below, not
      # from this checkout).
      - name: Checkout
        uses: actions/checkout@v7

      # merge-multiple flattens every artifact into release-staging/ with
      # clean basenames (no per-artifact subdirs), so the four release files
      # end up side by side.
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-staging
          merge-multiple: true

      - name: Verify and list artifact manifest
        shell: bash
        run: |
          set -euo pipefail
          cd release-staging
          echo "=== Artifact manifest ==="
          find . -maxdepth 1 -type f -printf '%f\n' | sort
          # Fail unless each expected artifact appears EXACTLY once.
          assert_one() {
            local pat="$1" label="$2"
            local found
            found="$(find . -maxdepth 1 -type f -name "$pat" | sort)"
            local n
            n="$(printf '%s\n' "$found" | grep -c . || true)"
            if [ "$n" -ne 1 ]; then
              echo "ERROR: expected exactly 1 $label ($pat), found $n:" >&2
              printf '%s\n' "$found" >&2
              exit 1
            fi
          }
          assert_one '*.AppImage' AppImage
          assert_one '*_amd64.deb' 'Debian package'
          assert_one '*.x86_64.rpm' 'RPM package'
          assert_one '*-x86_64.tar.gz' 'AUR tarball'
          # The glibc-requirement token produced by build-appimage must exist.
          if [ ! -s appimage-glibc-requirement.txt ]; then
            echo "ERROR: appimage-glibc-requirement.txt missing or empty" >&2
            exit 1
          fi
          echo "=== All expected artifacts present exactly once ==="

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd release-staging
          # Short, consistent release body (matches v0.1.7 and earlier): a
          # link to the changelog and a pointer to the checksum file. The
          # artifact list below the notes is self-evident from the attached
          # assets, and the AppImage's measured glibc requirement stays on the
          # run summary (job summary) where the build-appimage job writes it.
          {
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${RELEASE_TAG}/CHANGELOG.md) for what changed in this release."
            echo
            echo "Artifacts attached below include the AppImage, \`.deb\`, and \`.rpm\` packages. Verify them with the published \`SHA256SUMS\`."
          } > release-notes.md

          # On a tag push the git tag already exists; on a manual dispatch it
          # may not. Create the release for the existing tag when present
          # (passing --target to an existing tag errors "reference already
          # exists"); otherwise pin the tag to the commit this run built.
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --draft
          else
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --draft
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          cd release-staging
          gh release upload "${RELEASE_TAG}" \
            *.AppImage *_amd64.deb *.x86_64.rpm *-x86_64.tar.gz

      # Generated LAST, over exactly the four artifacts just uploaded, so the
      # checksum set can never lag behind the asset set. Basenames match the
      # release asset names so `sha256sum -c SHA256SUMS` works from a download
      # directory.
      - name: Generate and upload SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd release-staging
          sha256sum \
            *.AppImage *_amd64.deb *.x86_64.rpm *-x86_64.tar.gz \
            | sort -k2 > SHA256SUMS
          echo "Generated checksums:"
          cat SHA256SUMS
          gh release upload "${RELEASE_TAG}" SHA256SUMS

      # Only now — with all four artifacts AND SHA256SUMS attached — flip the
      # release from draft to public. Any earlier failure leaves it draft
      # (invisible, not downloadable).
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${RELEASE_TAG}" --draft=false
