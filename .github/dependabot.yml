version: 2
updates:
  # npm — frontend + build tooling (root package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # TypeScript 7 reworks the compiler/transform API that svelte-check and
      # @sveltejs/vite-plugin-svelte build on; bumping to 7.x fails the
      # type-check gate. Stay on 6.x until Svelte tooling supports TS 7.x.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # cargo — Rust host shell (src-tauri)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"

  # github-actions — keep the workflow actions pinned-to-tags but current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
